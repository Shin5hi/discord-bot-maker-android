<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050812"/>
      <stop offset="0.54" stop-color="#0A1326"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0A101D"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5865F2"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect x="58" y="48" width="1484" height="1104" rx="36" fill="none" stroke="#1D2B4A"/>

  <text x="106" y="126" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">PUBLIC BRAND BOARD</text>
  <text x="106" y="198" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="82" font-weight="800">Discord Bot Maker</text>
  <text x="108" y="246" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Visual reference for presenting the bot publicly while keeping the approved mark intact.</text>
  <rect x="108" y="278" width="520" height="5" rx="3" fill="url(#line)"/>

  <g filter="url(#shadow)">
    <rect x="106" y="318" width="684" height="482" rx="28" fill="url(#panel)" stroke="#294269"/>
    <text x="146" y="374" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="750">Primary Face</text>
    <text x="146" y="414" fill="#8FA5D8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Hero lockup for GitHub, portfolio and presentation covers.</text>
    <rect x="146" y="452" width="604" height="318" rx="18" fill="#030712" stroke="#1B2948"/>
    <image href="profile-lockup-tight.svg" x="158" y="470" width="580" height="282" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="318" width="684" height="482" rx="28" fill="url(#panel)" stroke="#294269"/>
    <text x="850" y="374" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="750">Launcher System</text>
    <text x="850" y="414" fill="#8FA5D8" font-family="Segoe UI, Arial, sans-serif" font-size="22">Circular and rounded-square masks, using one symbol.</text>
    <rect x="850" y="452" width="604" height="318" rx="18" fill="#232428" stroke="#3A3D46"/>
    <image href="app-icon-circle.svg" x="930" y="494" width="196" height="196" preserveAspectRatio="xMidYMid meet"/>
    <image href="app-icon-square.svg" x="1178" y="494" width="196" height="196" preserveAspectRatio="xMidYMid meet"/>
    <text x="1028" y="730" text-anchor="middle" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Circle mask</text>
    <text x="1276" y="730" text-anchor="middle" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Rounded square</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="106" y="836" width="420" height="220" rx="28" fill="url(#panel)" stroke="#294269"/>
    <text x="146" y="892" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="750">Palette</text>
    <rect x="146" y="930" width="58" height="44" rx="13" fill="#5865F2"/>
    <rect x="224" y="930" width="58" height="44" rx="13" fill="#3B82F6"/>
    <rect x="302" y="930" width="58" height="44" rx="13" fill="#22D3EE"/>
    <rect x="380" y="930" width="58" height="44" rx="13" fill="#9EEB25"/>
    <rect x="146" y="994" width="58" height="44" rx="13" fill="#030712" stroke="#2A3F67"/>
    <rect x="224" y="994" width="58" height="44" rx="13" fill="#171A21"/>
    <rect x="302" y="994" width="58" height="44" rx="13" fill="#F5F7FF"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="836" width="420" height="220" rx="28" fill="url(#panel)" stroke="#294269"/>
    <text x="630" y="892" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="750">Typography</text>
    <text x="630" y="970" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="800">Aa</text>
    <text x="746" y="954" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Bold sans identity</text>
    <text x="746" y="994" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">Clean support text</text>
    <text x="746" y="1034" fill="#22D3EE" font-family="Consolas, monospace" font-size="23">&gt;_ terminal accent</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1074" y="836" width="420" height="220" rx="28" fill="url(#panel)" stroke="#294269"/>
    <text x="1114" y="892" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="750">Usage</text>
    <text x="1114" y="938" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="20">Use dark hero backgrounds.</text>
    <text x="1114" y="974" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="20">Keep antennas and terminal face clear.</text>
    <text x="1114" y="1010" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="20">Scale lockup details as one unit.</text>
  </g>

  <text x="106" y="1118" fill="#6F7BFF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">ASSET MAP</text>
  <text x="246" y="1118" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">profile-mark · logo-lockup · readme-preview · app-icon-branding · brand-presentation · public-brand-deck</text>
</svg>
