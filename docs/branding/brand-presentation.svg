<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050812"/>
      <stop offset="0.52" stop-color="#091225"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101827"/>
      <stop offset="1" stop-color="#0A101D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5865F2"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="54" y="44" width="1492" height="812" rx="34" fill="none" stroke="#1D2B4A"/>

  <text x="96" y="112" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">DISCORD BOT MAKER</text>
  <text x="96" y="184" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="800">Public Brand Presentation</text>
  <text x="98" y="232" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="25">A dark, technical and Android-first visual system for a Discord bot maker.</text>
  <rect x="98" y="260" width="520" height="5" rx="3" fill="url(#accent)"/>

  <g filter="url(#shadow)">
    <rect x="96" y="318" width="726" height="416" rx="28" fill="url(#panel)" stroke="#294269"/>
    <rect x="124" y="346" width="670" height="360" rx="20" fill="#030712" stroke="#16233F"/>
    <image href="profile-lockup-tight.svg" x="124" y="346" width="670" height="360" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="858" y="318" width="590" height="416" rx="28" fill="url(#panel)" stroke="#294269"/>
    <text x="902" y="382" fill="#DCE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="750">Core Direction</text>
    <text x="902" y="430" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="23">Friendly bot shell, terminal face, Discord color,</text>
    <text x="902" y="462" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="23">and compact Android-first energy.</text>
    <rect x="902" y="490" width="176" height="86" rx="18" fill="#5865F2" fill-opacity="0.18" stroke="#5865F2"/>
    <text x="930" y="542" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Blurple</text>
    <rect x="1102" y="490" width="176" height="86" rx="18" fill="#22D3EE" fill-opacity="0.14" stroke="#22D3EE"/>
    <text x="1144" y="542" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Cyan</text>
    <rect x="1302" y="490" width="104" height="86" rx="18" fill="#030712" stroke="#2A3F67"/>
    <text x="1336" y="542" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Ink</text>
    <text x="902" y="642" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">PUBLIC USE</text>
    <text x="902" y="680" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="22">GitHub, portfolio, pitch decks, social previews</text>
    <text x="902" y="712" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="22">and future store assets.</text>
  </g>

  <text x="96" y="812" fill="#6F7BFF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">FINAL ASSETS</text>
  <text x="254" y="812" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="22">profile-mark · app-icon-branding · personal-brand-kit · public-brand-deck</text>
</svg>
