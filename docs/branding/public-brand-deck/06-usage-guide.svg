<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse"><stop stop-color="#030712"/><stop offset="1" stop-color="#091225"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101827"/><stop offset="1" stop-color="#0A101D"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="96" y="112" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">USAGE GUIDE</text>
  <text x="96" y="194" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="850">Keep the mark intentional.</text>
  <rect x="96" y="300" width="640" height="410" rx="30" fill="url(#panel)" stroke="#294269"/>
  <text x="146" y="372" fill="#9EEB25" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="850">Do</text>
  <text x="146" y="436" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Use dark hero surfaces.</text>
  <text x="146" y="496" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Preserve air around the antennas.</text>
  <text x="146" y="556" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Use cyan for terminal energy.</text>
  <text x="146" y="616" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Keep launcher masks simple.</text>
  <rect x="864" y="300" width="640" height="410" rx="30" fill="url(#panel)" stroke="#294269"/>
  <text x="914" y="372" fill="#DA373C" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="850">Avoid</text>
  <text x="914" y="436" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Cropping the terminal face.</text>
  <text x="914" y="496" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Busy backgrounds behind the bot.</text>
  <text x="914" y="556" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Random color swaps.</text>
  <text x="914" y="616" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Tiny unreadable presentation crops.</text>
  <image href="../profile-mark.png" x="470" y="668" width="660" height="230" preserveAspectRatio="xMidYMid meet"/>
</svg>
