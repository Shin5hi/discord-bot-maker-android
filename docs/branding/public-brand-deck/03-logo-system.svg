<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse"><stop stop-color="#030712"/><stop offset="1" stop-color="#091225"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101827"/><stop offset="1" stop-color="#0A101D"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="96" y="112" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">LOGO SYSTEM</text>
  <text x="96" y="194" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="850">One approved face.</text>
  <text x="98" y="250" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="28">The lockup is the public hero. The mark is the recognizable shortcut.</text>
  <rect x="96" y="304" width="908" height="508" rx="30" fill="url(#panel)" stroke="#294269"/>
  <rect x="138" y="344" width="824" height="420" rx="22" fill="#030712" stroke="#16233F"/>
  <image href="../profile-lockup-tight.svg" x="138" y="344" width="824" height="420" preserveAspectRatio="xMidYMid meet"/>

  <rect x="1040" y="304" width="464" height="508" rx="30" fill="url(#panel)" stroke="#294269"/>
  <text x="1084" y="366" fill="#F5F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Composition Rules</text>
  <text x="1084" y="416" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">1. KEEP ONE VISUAL UNIT</text>
  <text x="1084" y="452" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">Bot, wordmark, glow and Android</text>
  <text x="1084" y="484" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">badge scale together.</text>
  <rect x="1084" y="520" width="376" height="1" fill="#294269"/>
  <text x="1084" y="570" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">2. DO NOT MINIATURIZE DETAILS</text>
  <text x="1084" y="606" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">Avoid tiny lockup duplicates where</text>
  <text x="1084" y="638" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">the badge and glow lose clarity.</text>
  <rect x="1084" y="674" width="376" height="1" fill="#294269"/>
  <text x="1084" y="724" fill="#8EA9FF" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="800">3. PROTECT CLEAR SPACE</text>
  <text x="1084" y="760" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">Keep air around antennas, face,</text>
  <text x="1084" y="792" fill="#AAB6CE" font-family="Segoe UI, Arial, sans-serif" font-size="21">wordmark and badge.</text>
</svg>
